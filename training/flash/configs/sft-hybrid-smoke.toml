model = "Qwen/Qwen3.5-2B"
algorithm = "sft"
seed = 42

[environment]
id = "ariobarin/quip-hybrid-lexical"
pip = ["wordfreq==3.1.1"]

[environment.params]
split = "train"
lexical_hints = true

[train]
max_examples = 2000
lora_rank = 32
lora_alpha = 64
max_context_tokens = 1024
learning_rate = 1e-5
batch_size = 8
max_steps = 50
save_at_steps = [25, 50]
