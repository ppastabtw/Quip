# Full sourced-corpus run. Use sft-smoke.toml with the checked-in smoke dataset.
model = "Qwen/Qwen3.5-2B"
algorithm = "sft"
seed = 42

[environment]
id = "ariobarin/quip"

[environment.params]
split = "train"

[train]
max_examples = 2000
lora_rank = 32
lora_alpha = 64
max_context_tokens = 1024
learning_rate = 1e-5
batch_size = 8
max_steps = 250
save_at_steps = [50, 100, 150, 200, 250]
