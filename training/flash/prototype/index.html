<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quip</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f1eb;
      color: #1d211f;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; }
    main { width: min(760px, calc(100% - 32px)); margin: 36px auto; }
    h1 { font-size: 28px; letter-spacing: -.03em; margin: 0 0 18px; }
    .panel { background: #fffdf8; border: 1px solid #d9d4ca; border-radius: 18px; box-shadow: 0 18px 50px rgba(44, 47, 42, .08); padding: 24px; }
    label { display: block; font-size: 13px; font-weight: 750; margin-bottom: 8px; }
    input, textarea { width: 100%; border: 1px solid #cac5bb; border-radius: 10px; background: #fff; color: inherit; font: inherit; padding: 12px 14px; outline: none; }
    input:focus, textarea:focus { border-color: #39705b; box-shadow: 0 0 0 3px rgba(57, 112, 91, .13); }
    textarea { line-height: 1.5; resize: vertical; }
    #system-prompt { min-height: 180px; }
    #draft { min-height: 110px; }
    .field + .field { margin-top: 18px; }
    .controls { display: grid; gap: 16px; grid-template-columns: repeat(3, 1fr); margin-top: 18px; }
    .control-head { align-items: baseline; display: flex; justify-content: space-between; }
    output { color: #39705b; font-size: 12px; font-weight: 800; }
    input[type="range"] { accent-color: #39705b; border: 0; box-shadow: none; padding: 7px 0 0; }
    .actions { align-items: center; display: flex; gap: 14px; margin-top: 22px; }
    .run { border: 0; border-radius: 10px; background: #183d30; color: #fff; cursor: pointer; font: inherit; font-weight: 800; padding: 12px 18px; }
    .run:hover { background: #245744; }
    .run:disabled { cursor: wait; opacity: .58; }
    #status { color: #666b68; font-size: 13px; }
    #error { background: #fff1ee; border: 1px solid #efb8ad; border-radius: 10px; color: #9b3020; margin-top: 18px; padding: 12px 14px; }
    #result { margin-top: 18px; }
    .meta { color: #666b68; font-size: 12px; }
    #suggestions { display: grid; gap: 10px; margin: 10px 0 0; padding: 0; }
    .suggestion { background: #f7f4ed; border: 1px solid #ded8cd; border-radius: 12px; display: grid; gap: 10px; grid-template-columns: auto 1fr auto; list-style: none; padding: 14px; }
    .suggestion-index { color: #39705b; font-size: 12px; font-weight: 850; }
    .suggestion p { line-height: 1.45; margin: 0; white-space: pre-wrap; }
    .suggestion-meta { color: #777b78; font-size: 11px; white-space: nowrap; }
    [hidden] { display: none !important; }
    @media (max-width: 600px) { main { margin: 22px auto; } .panel { padding: 18px; } .controls { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main>
    <h1>Quip</h1>

    <section class="panel">
      <form id="form">
        <div class="field">
          <label for="model">Model</label>
          <input id="model" name="model" autocomplete="off" spellcheck="false">
        </div>

        <div class="field">
          <label for="system-prompt">System prompt</label>
          <textarea id="system-prompt" name="system_prompt" spellcheck="false"></textarea>
        </div>

        <div class="field">
          <label for="draft">Draft</label>
          <textarea id="draft" name="draft" placeholder="cnt cm tmrw" autofocus></textarea>
        </div>

        <div class="controls">
          <div>
            <div class="control-head"><label for="temperature">Temperature</label><output id="temperature-value">0.7</output></div>
            <input id="temperature" type="range" min="0" max="2" step="0.1" value="0.7">
          </div>
          <div>
            <div class="control-head"><label for="max-tokens">Max tokens</label><output id="max-tokens-value">128</output></div>
            <input id="max-tokens" type="range" min="16" max="512" step="16" value="128">
          </div>
          <div>
            <div class="control-head"><label for="suggestion-count">Suggestions</label><output id="suggestion-count-value">3</output></div>
            <input id="suggestion-count" type="range" min="1" max="5" step="1" value="3">
          </div>
        </div>

        <div class="actions">
          <button class="run" id="run" type="submit">Run model</button>
          <span id="status"></span>
        </div>
      </form>

      <div id="error" role="alert" hidden></div>

      <section id="result" aria-live="polite" hidden>
        <div class="meta" id="meta"></div>
        <ol id="suggestions"></ol>
      </section>
    </section>
  </main>

  <script>
    const form = document.querySelector('#form');
    const model = document.querySelector('#model');
    const systemPrompt = document.querySelector('#system-prompt');
    const draft = document.querySelector('#draft');
    const temperature = document.querySelector('#temperature');
    const maxTokens = document.querySelector('#max-tokens');
    const suggestionCount = document.querySelector('#suggestion-count');
    const run = document.querySelector('#run');
    const status = document.querySelector('#status');
    const errorBox = document.querySelector('#error');
    const result = document.querySelector('#result');

    function requestBody() {
      return {
        model: model.value.trim(),
        system_prompt: systemPrompt.value,
        draft: draft.value,
        temperature: Number(temperature.value),
        max_tokens: Number(maxTokens.value),
        suggestion_count: Number(suggestionCount.value)
      };
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.hidden = false;
      result.hidden = true;
    }

    form.addEventListener('submit', async event => {
      event.preventDefault();
      errorBox.hidden = true;
      result.hidden = true;
      if (!model.value.trim()) {
        showError('Enter a model ID.');
        model.focus();
        return;
      }
      if (!draft.value.trim()) {
        showError('Enter a draft to test.');
        draft.focus();
        return;
      }
      if (!systemPrompt.value.trim()) {
        showError('Enter a system prompt.');
        systemPrompt.focus();
        return;
      }

      const body = requestBody();

      run.disabled = true;
      status.textContent = 'Running managed inference...';
      try {
        const response = await fetch('/api/predict', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(body)
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || `Request failed with HTTP ${response.status}`);

        document.querySelector('#meta').textContent = `${data.model} | ${data.latency_ms} ms`;
        const list = document.querySelector('#suggestions');
        list.replaceChildren();
        data.suggestions.forEach(item => {
          const row = document.createElement('li');
          row.className = 'suggestion';
          const index = document.createElement('span');
          index.className = 'suggestion-index';
          index.textContent = item.index;
          const text = document.createElement('p');
          text.textContent = item.suggestion;
          const itemMeta = document.createElement('span');
          itemMeta.className = 'suggestion-meta';
          itemMeta.textContent = `${item.changed ? 'changed' : 'unchanged'} | ${item.latency_ms} ms`;
          row.append(index, text, itemMeta);
          list.append(row);
        });
        result.hidden = false;
        status.textContent = 'Complete';
      } catch (error) {
        showError(error.message);
        status.textContent = 'Request failed';
      } finally {
        run.disabled = false;
      }
    });

    document.addEventListener('keydown', event => {
      if (event.ctrlKey && event.key === 'Enter') form.requestSubmit();
    });

    [temperature, maxTokens, suggestionCount].forEach(control => {
      const output = document.querySelector(`#${control.id}-value`);
      control.addEventListener('input', () => {
        output.textContent = control.value;
      });
    });

    fetch('/api/config')
      .then(response => response.json())
      .then(config => {
        model.value = config.default_model;
        systemPrompt.value = config.system_prompt;
      })
      .catch(() => showError('Could not load configuration.'));
  </script>
</body>
</html>
